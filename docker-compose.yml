services:
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: socratic-nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=512m
      - JVM_XMX=512m
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
      - nacos-logs:/home/nacos/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8848/nacos/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: socratic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: socratic_ai
      MYSQL_USER: socratic
      MYSQL_PASSWORD: socratic
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: socratic-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: socratic-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: socratic
      RABBITMQ_DEFAULT_PASS: socratic
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  zipkin:
    image: openzipkin/zipkin:2.24
    container_name: socratic-zipkin
    ports:
      - "9411:9411"

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: socratic-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: socratic-pgvector
    profiles: ["pgvector"]
    environment:
      POSTGRES_DB: socratic_vector
      POSTGRES_USER: socratic
      POSTGRES_PASSWORD: socratic
    ports:
      - "5432:5432"
    volumes:
      - pgvector-data:/var/lib/postgresql/data

volumes:
  nacos-data:
  nacos-logs:
  mysql-data:
  redis-data:
  rabbitmq-data:
  qdrant-data:
  pgvector-data:
