spring:
  application:
    name: ai-orchestrator-service
  config:
    import:
      - optional:nacos:${spring.application.name}.yml?group=DEFAULT_GROUP
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
      config:
        server-addr: ${NACOS_SERVER:127.0.0.1:8848}
        namespace: ${NACOS_NAMESPACE:public}
        file-extension: yml
        group: DEFAULT_GROUP

server:
  port: 8083

